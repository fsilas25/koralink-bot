<!DOCTYPE html>
<html>
<head>
    <title>KoraLink Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
 
        body {
            background: #f0f2f5;
        }
 
        .chat-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #F59794;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
 
        .chat-container {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 380px;
            height: 570px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
        }
 
        .chat-header {
            background: #F59794;
            color: white;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
 
        .close-btn {
            cursor: pointer;
            font-size: 24px;
        }
 
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #ece5dd;
        }
 
        .bot-message {
            background: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 15px;
            max-width: 75%;
            width: fit-content;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
 
        .user-message {
            background: #dcf8c6;
            padding: 12px;
            margin: 10px 0 10px auto;
            border-radius: 15px;
            max-width: 75%;
            width: fit-content;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
 
        .error-message {
            background: #ffe0e0;
            padding: 12px;
            margin: 10px 0;
            border-radius: 15px;
            max-width: 75%;
            width: fit-content;
            color: #c0392b;
            font-size: 14px;
        }
 
        .typing {
            display: none;
            color: gray;
            padding: 6px 15px;
            font-style: italic;
            font-size: 13px;
            background: #ece5dd;
            flex-shrink: 0;
        }
 
        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: white;
            flex-shrink: 0;
        }
 
        .chat-input input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 16px;
        }
 
        .chat-input button {
            width: 50px;
            margin-left: 10px;
            border: none;
            border-radius: 50%;
            background: #F59794;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
 
        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
 
<body>
 
<button class="chat-btn" onclick="toggleChat()">&#129302;</button>
 
<div class="chat-container" id="chatContainer">
 
    <div class="chat-header">
        KoraLink Assistant
        <span class="close-btn" onclick="toggleChat()">&#215;</span>
    </div>
 
    <div class="chat-box" id="chatBox">
        <div class="bot-message">
            Hello! How can I help you today?
            <a href="https://www.djyh.rw/?utm_source=chatgpt.com">KoraLink Official Website</a>
        </div>
    </div>
 
    <div class="typing" id="typing">Bot is typing...</div>
 
    <div class="chat-input">
        <input
            type="text"
            id="message"
            placeholder="Type your message..."
            onkeypress="if(event.key === 'Enter') sendMessage()"
        >
        <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>
 
</div>
 
<script>
 
function toggleChat() {
    var box = document.getElementById("chatContainer");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}
 
function addMessage(text, type) {
    var chatBox = document.getElementById("chatBox");
    var div = document.createElement("div");
    div.className = type + "-message";
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}
 
function setTyping(visible) {
    document.getElementById("typing").style.display = visible ? "block" : "none";
    document.getElementById("sendBtn").disabled = visible;
    document.getElementById("message").disabled = visible;
}
 
async function sendMessage() {
    var input = document.getElementById("message");
    var message = input.value.trim();
    if (!message) return;
 
    addMessage(message, "user");
    input.value = "";
    setTyping(true);
 
    try {
        var response = await fetch("http://127.0.0.1:5000/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        });
 
        if (!response.ok) {
            throw new Error("Server returned an error.");
        }
 
        var data = await response.json();
        addMessage(data.response, "bot");
 
    } catch (error) {
        addMessage("Could not connect to the server. Please make sure the bot is running.", "error");
    } finally {
        setTyping(false);
        document.getElementById("message").focus();
    }
}
 
</script>
 
</body>
</html>
